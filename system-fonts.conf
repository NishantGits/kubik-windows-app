# Use system fonts to avoid path issues
font_path = C:/Windows/Fonts/arial.ttf
font_path_bold = C:/Windows/Fonts/arialbd.ttf
font_path_italic = C:/Windows/Fonts/ariali.ttf
font_path_bold_italic = C:/Windows/Fonts/arialbi.ttf

# Monospace font
mono_font_path = C:/Windows/Fonts/consola.ttf
mono_font_path_bold = C:/Windows/Fonts/consolab.ttf
mono_font_path_italic = C:/Windows/Fonts/consolai.ttf
mono_font_path_bold_italic = C:/Windows/Fonts/consolaz.ttf

# Performance settings
performance_tradeoffs = true
viewing_range = 100
client_mesh_chunk = 2
enable_mesh_cache = true
enable_vbo = true
vsync = true
