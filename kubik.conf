# Kubik configuration file for Windows distribution

# Force RUN_IN_PLACE mode
run_in_place = true

# Font settings - use absolute paths
font_path = %CURRENT_PATH%/Arimo-Regular.ttf
font_path_bold = %CURRENT_PATH%/Arimo-Bold.ttf
font_path_italic = %CURRENT_PATH%/Arimo-Italic.ttf
font_path_bold_italic = %CURRENT_PATH%/Arimo-BoldItalic.ttf

# Monospace font settings
mono_font_path = %CURRENT_PATH%/Cousine-Regular.ttf
mono_font_path_bold = %CURRENT_PATH%/Cousine-Bold.ttf
mono_font_path_italic = %CURRENT_PATH%/Cousine-Italic.ttf
mono_font_path_bold_italic = %CURRENT_PATH%/Cousine-BoldItalic.ttf

# Fallback font
fallback_font_path = %CURRENT_PATH%/DroidSansFallbackFull.ttf

# System font fallback
fallback_font_path = C:/Windows/Fonts/arial.ttf

# Font appearance
font_size = 16
mono_font_size = 16
font_shadow = 1
font_shadow_alpha = 127

# Performance settings for better experience
performance_tradeoffs = true
viewing_range = 100
client_mesh_chunk = 2
enable_mesh_cache = true
enable_vbo = true
vsync = true
occlusion_culler = bfs
preload_block_visuals = true
